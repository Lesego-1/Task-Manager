<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-blue-500 text-white p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold">Task Manager</h1>
        <button id="logout-btn" class="bg-white text-blue-500 px-4 py-2 rounded hover:bg-gray-200 transition">Logout</button>
    </header>

    <main class="p-6 max-w-4xl mx-auto">
        <section class="mb-6 bg-white p-6 rounded shadow-md">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Add New Task</h2>
            <form id="add-task-form" class="flex flex-col gap-3">
                <input type="text" id="task-title" placeholder="Task Title" class="p-2 border rounded-md" required>
                <textarea id="task-desc" placeholder="Task Description" class="p-2 border rounded-md" rows="3"></textarea>
                <input type="date" id="task-due" class="p-2 border rounded-md">
                <button type="submit" class="bg-green-500 text-white p-2 rounded hover:bg-green-600 transition">Add Task</button>
            </form>
        </section>

        <section class="mb-6">
            <h2 class="text-xl font-bold mb-3 text-gray-800">My Tasks</h2>
            <ul id="task-list" class="space-y-4"></ul>
        </section>

        <section id="admin-panel" class="mt-8 hidden">
            <h2 class="text-xl font-bold mb-2 text-gray-800">Admin Panel</h2>
            <ul id="user-list" class="space-y-2"></ul>
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/tasks.js"></script>
</body>
</html>
