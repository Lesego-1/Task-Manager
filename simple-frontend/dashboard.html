<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="animated-bg min-h-screen">
    <!-- Cursor Trail Container -->
    <div id="cursor-container"></div>

    <!-- Header -->
    <header class="dashboard-header fixed w-full top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#E04582] to-[#7FC3FF] flex items-center justify-center shadow-md">
                    <i data-lucide="layers" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-[#2D3748]">Task Manager</h1>
                    <p class="text-xs text-gray-500">Welcome back, User</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <!-- <button class="p-2 rounded-full hover:bg-white/50 transition relative">
                    <i data-lucide="bell" class="w-5 h-5 text-gray-700"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-[#E04582] rounded-full"></span>
                </button> -->
                <button id="logout-btn" class="secondary-btn flex items-center gap-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Logout</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Column: Add Task Form -->
            <div class="lg:col-span-1">
                <div class="glass-card p-6 sticky top-24">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="p-2 rounded-lg bg-[#FFCCDE]">
                            <i data-lucide="plus-circle" class="w-5 h-5 text-[#E04582]"></i>
                        </div>
                        <h2 class="text-xl font-bold text-[#2D3748]">New Task</h2>
                    </div>

                    <form id="add-task-form" class="flex flex-col gap-4">
                        <div class="relative">
                            <input type="text" id="task-title" placeholder="Task Title" class="modern-input !pl-10" required>
                            <i data-lucide="type" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        </div>

                        <div class="relative">
                            <textarea id="task-desc" placeholder="Description..." class="modern-input !pl-10 min-h-[100px] resize-none" rows="3"></textarea>
                            <i data-lucide="align-left" class="absolute left-3 top-3 w-4 h-4 text-gray-400"></i>
                        </div>

                        <div class="relative">
                            <input type="date" id="task-due" class="modern-input !pl-10">
                            <i data-lucide="calendar" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        </div>

                        <!-- <div class="flex gap-2 mt-2">
                            <select class="modern-input !py-2 text-sm">
                                <option value="low">Low Priority</option>
                                <option value="medium" selected>Medium Priority</option>
                                <option value="high">High Priority</option>
                            </select>
                        </div> -->

                        <button type="submit" class="gradient-btn w-full mt-2 flex items-center justify-center gap-2">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                            <span>Add Task</span>
                        </button>
                    </form>

                    <!-- Stats Mini Cards -->
                    <!-- <div class="grid grid-cols-2 gap-3 mt-6 pt-6 border-t border-gray-200">
                        <div class="bg-white/60 rounded-xl p-3 text-center">
                            <div class="text-2xl font-bold text-[#E04582]" id="total-tasks">0</div>
                            <div class="text-xs text-gray-600">Total Tasks</div>
                        </div>
                        <div class="bg-white/60 rounded-xl p-3 text-center">
                            <div class="text-2xl font-bold text-[#7FC3FF]" id="completed-tasks">0</div>
                            <div class="text-xs text-gray-600">Completed</div>
                        </div>
                    </div> -->
                </div>
            </div>

            <!-- Right Column: Task List -->
            <div class="lg:col-span-2">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-2">
                        <h2 class="text-2xl font-bold text-[#2D3748]">My Tasks</h2>
                        <span class="px-3 py-1 rounded-full bg-white/60 text-sm font-medium text-[#E04582]" id="task-count-badge">0</span>
                    </div>
                    <!-- <div class="flex gap-2">
                        <button class="p-2 rounded-lg bg-white/60 hover:bg-white transition text-gray-600" onclick="filterTasks('all')">
                            <span class="text-sm font-medium">All</span>
                        </button>
                        <button class="p-2 rounded-lg bg-white/40 hover:bg-white transition text-gray-500" onclick="filterTasks('active')">
                            <span class="text-sm font-medium">Active</span>
                        </button>
                        <button class="p-2 rounded-lg bg-white/40 hover:bg-white transition text-gray-500" onclick="filterTasks('completed')">
                            <span class="text-sm font-medium">Done</span>
                        </button>
                    </div> -->
                </div>

                <ul id="task-list" class="space-y-4">
                    <!-- Tasks will be injected here by JS -->
                    <li class="task-card flex flex-col gap-3">
                        <div class="flex items-start justify-between">
                            <div class="flex items-start gap-3">
                                <!-- <div class="mt-1">
                                    <input type="checkbox" class="w-5 h-5 rounded border-2 border-[#FF8EB7] text-[#E04582] focus:ring-[#E04582] cursor-pointer">
                                </div> -->
                                <div>
                                    <h3 class="font-bold text-[#2D3748] text-lg">Welcome to your new dashboard! 🎉</h3>
                                    <p class="text-gray-600 text-sm mt-1">This is a redesigned modern interface with smooth animations and glassmorphism effects.</p>
                                    <div class="flex items-center gap-2 mt-2 text-xs text-gray-500">
                                        <i data-lucide="clock" class="w-3 h-3"></i>
                                        <span>Due today</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button class="p-2 rounded-lg hover:bg-[#BADFFF]/30 transition text-[#7FC3FF]">
                                    <i data-lucide="edit-2" class="w-4 h-4"></i>
                                </button>
                                <button class="p-2 rounded-lg hover:bg-[#FFCCDE]/30 transition text-[#E04582]">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <!-- <div class="flex gap-2 mt-1">
                            <span class="status-pending">Pending</span>
                            <span class="px-2 py-0.5 rounded-full bg-[#BADFFF]/50 text-[#2D3748] text-xs font-medium">Design</span>
                        </div> -->
                    </li>
                </ul>

                <!-- Empty State (Hidden by default) -->
                <div id="empty-state" class="hidden text-center py-12">
                    <div class="w-24 h-24 mx-auto mb-4 rounded-full bg-white/60 flex items-center justify-center">
                        <i data-lucide="clipboard-check" class="w-12 h-12 text-[#FF8EB7]"></i>
                    </div>
                    <h3 class="text-xl font-bold text-[#2D3748] mb-2">All caught up!</h3>
                    <p class="text-gray-600">No tasks found. Create one to get started.</p>
                </div>

                <!-- Admin Panel -->
                <section id="admin-panel" class="admin-panel mt-8 hidden">
                    <div class="flex items-center gap-2 mb-4">
                        <i data-lucide="shield" class="w-5 h-5 text-[#E04582]"></i>
                        <h2 class="text-lg font-bold text-[#2D3748]">Admin Panel</h2>
                    </div>
                    <ul id="user-list" class="space-y-3">
                        <!-- Users will be listed here -->
                    </ul>
                </section>
            </div>
        </div>
    </main>

    <!-- <script src="js/auth.js"></script>
    <script src="js/tasks.js"></script> -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Cursor Trail Effect
        const cursorContainer = document.getElementById('cursor-container');
        
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.9) {
                createTrail(e.clientX, e.clientY);
            }
        });

        function createTrail(x, y) {
            const trail = document.createElement('div');
            trail.className = 'cursor-trail';
            trail.style.left = x + 'px';
            trail.style.top = y + 'px';
            trail.style.width = (Math.random() * 20 + 10) + 'px';
            trail.style.height = trail.style.width;
            
            const colors = ['#7FC3FF', '#FF8EB7'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            trail.style.background = `radial-gradient(circle, ${color}40, transparent)`;
            
            cursorContainer.appendChild(trail);
            
            setTimeout(() => {
                trail.style.transform = `translate(-50%, -50%) scale(3)`;
                trail.style.opacity = '0';
            }, 50);
            
            setTimeout(() => trail.remove(), 800);
        }

        // Task Animation Observer
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        // Observe task cards
        document.querySelectorAll('.task-card').forEach(card => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            observer.observe(card);
        });

        // Filter function placeholder (to be implemented with your JS)
        function filterTasks(filter) {
            // This function preserves the onclick handlers for your existing JS implementation
            console.log('Filtering:', filter);
        }

        // Click ripple effect
        document.addEventListener('click', (e) => {
            // Don't trigger if clicking on interactive elements
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A' || e.target.tagName === 'INPUT') return;
            
            const ripple = document.createElement('div');
            ripple.style.position = 'fixed';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            ripple.style.width = '0';
            ripple.style.height = '0';
            ripple.style.borderRadius = '50%';
            ripple.style.background = 'rgba(255, 142, 183, 0.3)';
            ripple.style.transform = 'translate(-50%, -50%)';
            ripple.style.pointerEvents = 'none';
            ripple.style.zIndex = '0';
            ripple.style.transition = 'all 0.8s ease-out';
            
            document.body.appendChild(ripple);
            
            setTimeout(() => {
                ripple.style.width = '150px';
                ripple.style.height = '150px';
                ripple.style.opacity = '0';
            }, 10);
            
            setTimeout(() => ripple.remove(), 800);
        });
    </script>
</body>
</html>
