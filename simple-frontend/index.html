<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
        <h1 class="text-3xl font-bold mb-6 text-center text-gray-800">Task Manager Login</h1>
        <form id="login-form" class="flex flex-col gap-4">
            <input type="email" id="email" placeholder="Email" class="p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400" required>
            <input type="password" id="password" placeholder="Password" class="p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400" required>
            <button type="submit" class="bg-blue-500 text-white p-3 rounded-md hover:bg-blue-600 transition">Login</button>
        </form>
        <p class="mt-4 text-center text-gray-600">Don't have an account? <a href="register.html" class="text-blue-500 hover:underline">Register</a></p>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
